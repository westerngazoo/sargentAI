name: ci

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel main runs; a fast-follow merge must still record a green build.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  rust:
    name: rust (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitai_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fitai_ci
      JWT_SECRET: ci-only-test-secret
      # `ort` is built with `download-binaries` off (see backend/Cargo.toml), so
      # cargo links/dlopens ONNX Runtime from a library we install below rather
      # than fetching it from cdn.pyke.io. Keep this version in lockstep with
      # `ARG ONNXRUNTIME_VERSION` in backend/Dockerfile.
      ONNXRUNTIME_VERSION: 1.24.2
    steps:
      - uses: actions/checkout@v4
      - name: install ONNX Runtime (for ort system linking)
        run: |
          set -euo pipefail
          pkg="onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}"
          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/${pkg}.tgz" \
            -o /tmp/ort.tgz
          sudo mkdir -p /opt/onnxruntime
          sudo tar -xzf /tmp/ort.tgz -C /opt/onnxruntime --strip-components=1 "${pkg}/lib" "${pkg}/include"
          test -e /opt/onnxruntime/lib/libonnxruntime.so
          {
            echo "ORT_STRATEGY=system"
            echo "ORT_LIB_LOCATION=/opt/onnxruntime/lib"
            echo "ORT_PREFER_DYNAMIC_LINK=1"
            echo "LD_LIBRARY_PATH=/opt/onnxruntime/lib:${LD_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"
      - name: install toolchain
        run: rustup show  # reads rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: cargo build --workspace --all-targets --locked

  mobile:
    name: mobile (analyze, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: mobile/.flutter-version
          channel: stable
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build backend image
        run: docker build -t fitai-api:ci backend
