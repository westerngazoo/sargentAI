name: fitai
description: "fitAI mobile client — thin: capture, display, no on-device inference."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  audio_service: ^0.18.19
  just_audio: ^0.10.6
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  flutter_svg: ^2.0.10
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/silence.mp3
