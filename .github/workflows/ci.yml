name: ci

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  ONNXRUNTIME_VERSION: 1.24.2
  ONNXRUNTIME_CHECKSUM_X64: 43725474ba5663642e17684717946693850e2005efbd724ac72da278fead25e6
  ONNXRUNTIME_CHECKSUM_ARM64: 6715b3d19965a2a6981e78ed4ba24f17a8c30d2d26420dbed10aac7ceca0085e

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel main runs; a fast-follow merge must still record a green build.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  rust:
    name: rust (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitai_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fitai_ci
      JWT_SECRET: ci-only-test-secret
    steps:
      - uses: actions/checkout@v4
      - name: cache ONNX Runtime tarball
        id: cache-onnx
        uses: actions/cache@v4
        with:
          path: /tmp/ort.tgz
          key: onnxruntime-x64-${{ env.ONNXRUNTIME_VERSION }}-${{ env.ONNXRUNTIME_CHECKSUM_X64 }}
      - name: install ONNX Runtime (for ort system linking)
        run: |
          set -euo pipefail
          pkg="onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}"
          if [ ! -f /tmp/ort.tgz ]; then
            curl --proto '=https' --tlsv1.2 -fsSL \
              "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/${pkg}.tgz" \
              -o /tmp/ort.tgz
          fi
          echo "${ONNXRUNTIME_CHECKSUM_X64}  /tmp/ort.tgz" | sha256sum -c -
          sudo mkdir -p /opt/onnxruntime
          sudo tar -xzf /tmp/ort.tgz -C /opt/onnxruntime --strip-components=1 "${pkg}/lib" "${pkg}/include"
          test -e /opt/onnxruntime/lib/libonnxruntime.so
          {
            echo "ORT_STRATEGY=system"
            echo "ORT_LIB_LOCATION=/opt/onnxruntime/lib"
            echo "ORT_PREFER_DYNAMIC_LINK=1"
            echo "LD_LIBRARY_PATH=/opt/onnxruntime/lib:${LD_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"
      - name: install toolchain
        run: rustup show  # reads rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: cargo build --workspace --all-targets --locked

  mobile:
    name: mobile (analyze, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: mobile/.flutter-version
          channel: stable
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build backend image
        run: |
          docker build -t fitai-api:ci \
            --build-arg ONNXRUNTIME_VERSION="${ONNXRUNTIME_VERSION}" \
            --build-arg ONNXRUNTIME_CHECKSUM_X64="${ONNXRUNTIME_CHECKSUM_X64}" \
            --build-arg ONNXRUNTIME_CHECKSUM_ARM64="${ONNXRUNTIME_CHECKSUM_ARM64}" \
            backend
