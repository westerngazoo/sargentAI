services:
  postgres:
    image: postgres:16
    container_name: fitai-postgres
    environment:
      POSTGRES_USER: fitai
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: fitai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "fitai", "-d", "fitai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
